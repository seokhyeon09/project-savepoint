services:
 mysql:
  image: mysql:8.0
  platform: linux/amd64  # 맥북 대응용 플랫폼 교체
  container_name: mysql-spdb
  environment:
   MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpass}
   MYSQL_DATABASE: ${MYSQL_DATABASE:-spdb}
   MYSQL_USER: ${MYSQL_USER:-spuser}
   MYSQL_PASSWORD: ${MYSQL_PASSWORD:-sppass}
  ports:
   - "3306:3306"
  volumes:
   - mysql_data:/var/lib/mysql
  healthcheck:
   test:
    [
     "CMD",
     "mysqladmin",
     "ping",
     "-h",
     "127.0.0.1",
     "-uroot",
     "-p${MYSQL_ROOT_PASSWORD:-rootpass}",
    ]
   interval: 5s
   timeout: 3s
   retries: 30

 backend:
  build:
   context: ./backend
   dockerfile: Dockerfile.dev
  container_name: spring-back
  depends_on:
   mysql:
    condition: service_healthy
  environment:
   SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/${MYSQL_DATABASE:-spdb}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Seoul
   SPRING_DATASOURCE_USERNAME: ${MYSQL_USER:-spuser}
   SPRING_DATASOURCE_PASSWORD: ${MYSQL_PASSWORD:-sppass}
   GRADLE_USER_HOME: /root/.gradle
   AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID}
   AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY}
   AWS_REGION: ${AWS_REGION:-ap-northeast-2}
   AWS_S3_BUCKET: ${AWS_S3_BUCKET:-picstory2}
   KAKAO_CLIENT_ID: ${KAKAO_CLIENT_ID}        # ← 이거 추가
   KAKAO_REDIRECT_URI: ${KAKAO_REDIRECT_URI} 
   KAKAO_CLIENT_SECRET: ${KAKAO_CLIENT_SECRET}

  ports:
   - "8080:8080"
  volumes:
   - ./backend:/app
   - gradle_cache:/root/.gradle
   - /app/build
   - /app/.gradle
  healthcheck:
   test: ["CMD-SHELL", "curl -f http://localhost:8080/api/todos || exit 1"]
   interval: 10s
   timeout: 5s
   retries: 10
   start_period: 60s

 frontend:
  build:
   context: ./frontend
   dockerfile: Dockerfile.dev
  container_name: vite-front
  depends_on:
   backend:
    condition: service_healthy
  environment:
   CHOKIDAR_USEPOLLING: "true"
   WATCHPACK_POLLING: "true"
  ports:
   - "5173:5173"
  volumes:
   - ./frontend:/app
   - /app/node_modules

volumes:
 mysql_data:
 gradle_cache: