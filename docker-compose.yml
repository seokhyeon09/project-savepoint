services:
  mysql:
    image: mysql:8.0
    container_name: mysql-spdb
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: ${MYSQL_DATABASE}
      MYSQL_USER: ${MYSQL_USER}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test:
        [
          "CMD",
          "mysqladmin",
          "ping",
          "-h",
          "127.0.0.1",
          "-uroot",
          "-p${MYSQL_ROOT_PASSWORD}",
        ]
      interval: 5s
      timeout: 3s
      retries: 30

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile.dev
    container_name: spring-back
    depends_on:
      mysql:
        condition: service_healthy
    env_file:
      - .env #AWS, 카카오 키 세팅을 한 줄로 변경
    environment:
      # DB 연결 정보와 CORS 설정 등 필수적인 것만 남깁니다.
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/${MYSQL_DATABASE}?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Seoul
      SPRING_DATASOURCE_USERNAME: ${MYSQL_USER}
      SPRING_DATASOURCE_PASSWORD: ${MYSQL_PASSWORD}
      GRADLE_USER_HOME: /root/.gradle
      CORS_ALLOWED_ORIGINS: http://localhost:5173
    ports:
      - "8080:8080"
    volumes:
      - ./backend:/app
      - gradle_cache:/root/.gradle
      - /app/build
      - /app/.gradle
    healthcheck:
      # 💡 특강은 /hello 지만, 우리는 회원님 서버에 맞게 /actuator/health 로 변경!
      test: ["CMD-SHELL", "curl -sf --connect-timeout 2 http://127.0.0.1:8080/hello >/dev/null || exit 1"]
      interval: 15s
      timeout: 10s
      retries: 30
      start_period: 300s

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.dev
    container_name: vite-front
    depends_on:
      backend:
        condition: service_healthy
    environment:
      CHOKIDAR_USEPOLLING: "true"
      WATCHPACK_POLLING: "true"
      VITE_API_URL: http://localhost:8080
    ports:
      - "5173:5173"
    volumes:
      - ./frontend:/app
      - /app/node_modules

volumes:
  mysql_data:
  gradle_cache: